<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบประเมินคุณลักษณะอันพึงประสงค์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .login-bg {
            background-image: url('https://images.unsplash.com/photo-1577896851231-70ef18881754?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen relative pb-20">

  <div id="login-view" class="min-h-screen flex flex-col items-center justify-center relative login-bg">
    <div class="absolute inset-0 bg-blue-900 bg-opacity-60"></div>
    <div class="relative z-10 w-full max-w-sm px-6 flex flex-col items-center">
      <div class="bg-white p-6 rounded-2xl shadow-xl w-full mb-6">
        <div class="text-center mb-4">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-inner text-3xl">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-10 h-10"><path fill-rule="evenodd" d="M8.603 3.799A4.49 4.49 0 0112 2.25c1.357 0 2.573.6 3.397 1.549a4.49 4.49 0 013.498 1.307 4.491 4.491 0 011.307 3.497A4.49 4.49 0 0121.75 12a4.49 4.49 0 01-1.549 3.397 4.491 4.491 0 01-1.307 3.497 4.491 4.491 0 01-3.497 1.307A4.49 4.49 0 0112 21.75a4.49 4.49 0 01-3.397-1.549 4.49 4.49 0 01-3.498-1.306 4.491 4.491 0 01-1.307-3.498A4.49 4.49 0 012.25 12c0-1.357.6-2.573 1.549-3.397a4.49 4.49 0 011.307-3.497 4.49 4.49 0 013.497-1.307zm7.007 6.387a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd" /></svg>
            </div>
            <h2 class="font-bold text-blue-800 text-lg">ระบบประเมินคุณลักษณะฯ</h2>
            <p class="text-xs text-gray-500">โรงเรียนเทศบาลวัดโขดทิมทาราม</p>
        </div>
        
        <div class="mb-3">
          <label class="block text-gray-700 text-xs font-bold mb-1">ชื่อผู้ใช้ (Username)</label>
          <input type="text" id="username" class="w-full px-4 py-2.5 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>
        <div class="mb-5">
          <label class="block text-gray-700 text-xs font-bold mb-1">รหัสผ่าน (Password)</label>
          <input type="password" id="password" class="w-full px-4 py-2.5 rounded-lg border focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
        </div>

        <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition duration-200 text-sm">
          เข้าสู่ระบบ
        </button>
      </div>
    </div>
  </div>

<script>
    // 🔴 อย่าลืมเปลี่ยน URL ตรงนี้เป็นของ Web App ตัวใหม่ 🔴
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwrERAn8x9CKmnds_ddtggHwhdjfiGFXssmT4Qs0o5v8e5oShlDetvQyycJpQtFJrIpZw/exec"; 

    function getSystemPeriod() {
      const now = new Date();
      const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
      const monthName = months[now.getMonth()];
      const currentYearBE = now.getFullYear() + 543;
      let term = "";
      const m = now.getMonth(); 
      if (m >= 4 && m <= 9) { term = "1/" + currentYearBE; } else {
        const termYear = (m <= 3) ? currentYearBE - 1 : currentYearBE;
        term = "2/" + termYear;
      }
      return { term: term, month: monthName };
    }

    document.addEventListener("DOMContentLoaded", () => { checkLocalSession(); });

    async function checkLocalSession() {
      const storedUser = localStorage.getItem("charAssessUser");
      if (storedUser) {
        try {
          const period = getSystemPeriod();
          const u = JSON.parse(storedUser);
          const response = await fetch(GAS_WEB_APP_URL, {
            method: 'POST', 
            body: JSON.stringify({ action: "login", username: u.username, password: u.password }),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });
          const result = await response.json();
          if (result.status === "success") {
            window.location.href = `students.html?room=${encodeURIComponent(result.teacherRoom)}&tname=${encodeURIComponent(result.teacherName)}&term=${encodeURIComponent(period.term)}&month=${encodeURIComponent(period.month)}`;
          } else { localStorage.removeItem("charAssessUser"); }
        } catch (error) { }
      }
    }

    async function handleLogin() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();

      if(!user || !pass) { Swal.fire("แจ้งเตือน", "กรุณากรอกข้อมูลให้ครบถ้วน", "warning"); return; }
      const period = getSystemPeriod();

      Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST', 
          body: JSON.stringify({ action: "login", username: user, password: pass }),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const result = await response.json();
        if (result.status === "success") {
          localStorage.setItem("charAssessUser", JSON.stringify({username: user, password: pass}));
          Swal.fire({ title: 'สำเร็จ!', text: 'เข้าสู่ระบบเรียบร้อย', icon: 'success', timer: 1500, showConfirmButton: false }).then(() => {
              window.location.href = `students.html?room=${encodeURIComponent(result.teacherRoom)}&tname=${encodeURIComponent(result.teacherName)}&term=${encodeURIComponent(period.term)}&month=${encodeURIComponent(period.month)}`;
          });
        } else { Swal.fire("ข้อผิดพลาด", result.message, "error"); }
      } catch (error) { Swal.fire("ข้อผิดพลาด", "เชื่อมต่อฐานข้อมูลไม่สำเร็จ", "error"); }
    }
  </script>
</body>
</html>
